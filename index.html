<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinic Record System</title>

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #1e1f2f, #3a3b5a);
    text-align: center;
    margin-top: 40px;
    color: #fff;
}

h2 {
    font-style: italic;
    font-weight: bold;
    letter-spacing: 1px;
}

input {
    padding: 12px;
    margin: 6px;
    border: none;
    border-radius: 10px;
    width: 220px;
    background: #2c2d44;
    color: white;
    outline: none;
}

input::placeholder {
    color: #aaa;
    font-style: italic;
}

button {
    padding: 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

.addBtn {
    background: linear-gradient(45deg, #00c6ff, #0072ff);
}

.addBtn:hover {
    transform: scale(1.05);
}

table {
    margin: 30px auto;
    border-collapse: collapse;
    width: 75%;
    background: #2c2d44;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
}

th {
    background: linear-gradient(45deg, #ff7eb3, #ff758c);
    color: white;
    font-style: italic;
    font-weight: bold;
    padding: 14px;
}

td {
    padding: 14px;
    font-style: italic;
}

tr:nth-child(even) {
    background: #3a3b5a;
}

tr:hover {
    background: #50527a;
    transition: 0.3s;
}

.editBtn {
    background: linear-gradient(45deg, #36d1dc, #5b86e5);
    margin-right: 5px;
}

.delBtn {
    background: linear-gradient(45deg, #ff4e50, #f00000);
}
</style>
</head>
<body>

<h2>Clinic Record System 🏥</h2>

<input type="text" placeholder="Enter Name" id="patientName">
<input type="number" placeholder="Enter Number" id="phoneNumber">
<input type="text" placeholder="Enter Time" id="appTime">
<button class="addBtn" onclick="addRecord()">Add</button>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Number</th>
            <th>Time</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="tableBody">
        </tbody>
</table>

<script>
let patientName = document.getElementById('patientName');
let patientNumber = document.getElementById("phoneNumber");
let appTime = document.getElementById("appTime");
let tableBody = document.getElementById('tableBody');

function addRecord() {
    // Basic validation check
    if(patientName.value.trim() !== "" && patientNumber.value.trim() !== "" && appTime.value.trim() !== "") {

        // Duplicate check logic (poora record same ho tabhi rokay)
        let rows = tableBody.querySelectorAll("tr");
        for(let i = 0; i < rows.length; i++) {
            let cols = rows[i].querySelectorAll("td");
            
            let name = cols[0].innerText;
            let number = cols[1].innerText;
            let time = cols[2].innerText;

            if(name === patientName.value && number === patientNumber.value && time === appTime.value) {
                alert("❌ This exact record already exists!");
                return;
            }
        }

        let tr = document.createElement("tr");

        let td1 = document.createElement("td");
        td1.innerText = patientName.value;

        let td2 = document.createElement("td");
        td2.innerText = patientNumber.value;

        let td3 = document.createElement("td");
        td3.innerText = appTime.value;

        let td4 = document.createElement("td");

        // Edit Button setup
        let editBtn = document.createElement("button");
        editBtn.innerText = "Edit";
        editBtn.classList.add("editBtn");
        editBtn.onclick = function() {
            patientName.value = td1.innerText;
            patientNumber.value = td2.innerText;
            appTime.value = td3.innerText;
            tr.remove();
        };

        // Delete Button setup
        let delBtn = document.createElement("button");
        delBtn.innerText = "Delete";
        delBtn.classList.add("delBtn");
        delBtn.onclick = function() {
            tr.remove();
        };

        td4.append(editBtn, delBtn);
        tr.append(td1, td2, td3, td4);
        tableBody.append(tr);

        // Inputs reset karne k liye
        patientName.value = "";
        patientNumber.value = "";
        appTime.value = "";
    } else {
        alert("Please fill all the fields!");
    }
}

// Enter key press par add ho jaye
document.addEventListener("keypress", function(e) {
    if(e.key === "Enter") {
        addRecord();
    }
});
</script>

</body>
</html>
